<!DOCTYPE html>
<html lang="en-ZA">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SafeNet SA — The only digital safety platform built for South African families. Monitors WhatsApp. Speaks Zulu. POPIA compliant. Ready in 5 minutes." />
    <meta name="theme-color" content="#0F7B4D" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://safenet-sa.co.za/" />

    <!-- Open Graph (fallback for crawlers that don't execute JS) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://safenet-sa.co.za/" />
    <meta property="og:title" content="SafeNet SA — Digital Safety for South African Families" />
    <meta property="og:description" content="The only digital safety platform built for South African families. Monitors WhatsApp. Speaks Zulu. POPIA compliant. Ready in 5 minutes." />
    <meta property="og:image" content="https://safenet-sa.co.za/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SafeNet SA — Protect your family online" />
    <meta property="og:site_name" content="SafeNet SA" />
    <meta property="og:locale" content="en_ZA" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SafeNet SA — Digital Safety for South African Families" />
    <meta name="twitter:description" content="The only digital safety platform built for South African families. Monitors WhatsApp. Speaks Zulu. POPIA compliant. Ready in 5 minutes." />
    <meta name="twitter:image" content="https://safenet-sa.co.za/og-image.png" />

    <title>SafeNet SA — Digital Safety for South African Families</title>

    <!-- Font preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SafeNet SA",
      "url": "https://safenet-sa.co.za",
      "logo": "https://safenet-sa.co.za/favicon.svg",
      "description": "The only digital safety platform built for South African families. Monitors WhatsApp. Speaks Zulu. POPIA compliant. Ready in 5 minutes.",
      "foundingLocation": "South Africa",
      "areaServed": "ZA",
      "knowsLanguage": ["en", "zu", "af", "xh", "st", "tn", "nso", "ve", "ts", "ss", "nr"],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": ["English", "isiZulu", "Afrikaans", "isiXhosa", "Sesotho", "Setswana", "Sepedi", "Tshivenḓa", "Xitsonga", "siSwati", "isiNdebele"]
      }
    }
    </script>

    <!-- JSON-LD: FAQ Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is SafeNet SA?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SafeNet SA is the only digital safety platform purpose-built for South African families. It monitors WhatsApp messages using on-device AI, supports all 11 official South African languages, and is fully POPIA compliant. Parents can track location, manage screen time, block apps, pause internet, and receive real-time alerts about threats."
          }
        },
        {
          "@type": "Question",
          "name": "Does SafeNet SA work on WhatsApp?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. SafeNet SA is the only parental control platform that monitors WhatsApp messages for threats like phishing, grooming, and cyberbullying. Luna AI analyzes messages on-device — no message content is ever transmitted or stored. It understands South African English, slang, and multilingual conversations."
          }
        },
        {
          "@type": "Question",
          "name": "How many South African languages does SafeNet SA support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SafeNet SA supports all 11 official South African languages: English, isiZulu, Afrikaans, isiXhosa, Sesotho, Setswana, Sepedi, Tshivenḓa, Xitsonga, siSwati, and isiNdebele. Alerts, voice notifications, and the full dashboard are available in your preferred language."
          }
        },
        {
          "@type": "Question",
          "name": "Is SafeNet SA POPIA compliant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, SafeNet SA is fully compliant with South Africa's Protection of Personal Information Act (POPIA). All WhatsApp analysis happens on-device — no message content leaves the child's device. Alert data is stored securely for 90 days and location data for 30 days. Parents can request data deletion at any time."
          }
        },
        {
          "@type": "Question",
          "name": "How much does SafeNet SA cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SafeNet SA offers a Free plan with basic WhatsApp monitoring and Luna AI alerts. The Guardian plan costs R89 per month (or R890 per year) and covers up to 4 children with all 11 languages. The Sentinel plan costs R149 per month (or R1,490 per year) for unlimited children, School Shield integration, and 24/7 phone support."
          }
        },
        {
          "@type": "Question",
          "name": "Can my child uninstall SafeNet SA?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. SafeNet SA uses device admin privileges to prevent removal. If a child attempts to uninstall the app, Luna AI immediately alerts the parent and blocks the uninstall attempt. This is one of the most requested features from South African parents."
          }
        },
        {
          "@type": "Question",
          "name": "Does SafeNet SA work in South African schools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. SafeNet SA offers School Shield — a complete digital safety solution for South African schools. Features include batch enrollment via CSV, curriculum mode to silence devices during class, emergency broadcast to all parents, and a school-wide admin dashboard. Over 50 schools in South Africa are already enrolled."
          }
        }
      ]
    }
    </script>

    <!-- JSON-LD: BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://safenet-sa.co.za/" },
        { "@type": "ListItem", "position": 2, "name": "Sign Up", "item": "https://safenet-sa.co.za/auth" },
        { "@type": "ListItem", "position": 3, "name": "Dashboard", "item": "https://safenet-sa.co.za/dashboard" },
        { "@type": "ListItem", "position": 4, "name": "Alerts", "item": "https://safenet-sa.co.za/alerts" },
        { "@type": "ListItem", "position": 5, "name": "Location Tracking", "item": "https://safenet-sa.co.za/location" },
        { "@type": "ListItem", "position": 6, "name": "Settings", "item": "https://safenet-sa.co.za/settings" }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root">
      <!--
        Minimal loading state shown while React hydrates.
        All SEO content (meta tags, JSON-LD, OG) is in <head> above.
        The React app replaces this content when it loads.
      -->
      <div style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
        background: #f8faf8;
        color: #1a1a2e;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        gap: 1.25rem;
        padding: 2rem;
      ">
        <!-- Shield icon -->
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 4L6 12V22C6 34 14 40 24 44C34 40 42 34 42 22V12L24 4Z" fill="#0F7B4D" opacity="0.15"/>
          <path d="M24 4L6 12V22C6 34 14 40 24 44C34 40 42 34 42 22V12L24 4Z" stroke="#0F7B4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18 24L22 28L30 20" stroke="#0F7B4D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <div style="
          width: 32px;
          height: 32px;
          border-radius: 50%;
          border: 3px solid #0F7B4D20;
          border-top-color: #0F7B4D;
          animation: safenet-spin 0.8s linear infinite;
        "></div>

        <p style="
          margin: 0;
          font-size: 0.875rem;
          color: #4a5568;
          letter-spacing: 0.01em;
        ">Loading SafeNet SA…</p>
      </div>

      <style>
        @keyframes safenet-spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
