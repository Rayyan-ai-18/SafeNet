<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeNet SA — Family Shield</title>
  <style>
    :root {
      --primary: #0F7B4D;
      --primary-light: #E6F4EC;
      --text: #14201A;
      --text-2: #4B5A53;
      --text-3: #8A968F;
      --border: #E4EAE6;
      --surface: #F6F9F7;
      --danger: #DC2626;
      --warn: #D97706;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      background: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Motion: calm, meaningful, transform/opacity only ───────────────── */
    @keyframes sn-rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes sn-orb-in { 0% { opacity: 0; transform: scale(0.6); } 60% { transform: scale(1.06); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes sn-pulse { 0% { box-shadow: 0 2px 8px rgba(0,0,0,0.12), 0 0 0 0 var(--orb-glow, rgba(15,123,77,0.35)); } 70% { box-shadow: 0 2px 8px rgba(0,0,0,0.12), 0 0 0 9px transparent; } 100% { box-shadow: 0 2px 8px rgba(0,0,0,0.12), 0 0 0 0 transparent; } }
    /* Sections rise in, gently staggered, so the popup feels assembled not dumped. */
    .verdict { animation: sn-rise 260ms cubic-bezier(0.22, 1, 0.36, 1) both; animation-delay: 30ms; }
    .signals { animation: sn-rise 260ms cubic-bezier(0.22, 1, 0.36, 1) both; animation-delay: 70ms; }
    .stats   { animation: sn-rise 260ms cubic-bezier(0.22, 1, 0.36, 1) both; animation-delay: 110ms; }
    .check-box { animation: sn-rise 260ms cubic-bezier(0.22, 1, 0.36, 1) both; animation-delay: 150ms; }
    .footer  { animation: sn-rise 260ms cubic-bezier(0.22, 1, 0.36, 1) both; animation-delay: 190ms; }
    .signals .item { animation: sn-rise 220ms ease-out both; }
    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo svg { width: 18px; height: 18px; }
    .brand { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
    .brand small { display: block; font-size: 11px; font-weight: 500; color: var(--text-3); }

    .verdict {
      padding: 18px 16px;
      display: flex; align-items: center; gap: 14px;
    }
    .orb {
      width: 44px; height: 44px; border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: background 320ms ease;
      animation: sn-orb-in 420ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    /* A single breathing pulse on a fresh verdict — confirms the page was just graded. */
    .orb.pulse { animation: sn-orb-in 420ms cubic-bezier(0.34, 1.56, 0.64, 1) both, sn-pulse 1400ms ease-out 420ms 1; }
    .verdict-text { min-width: 0; }
    .verdict-text .label { font-size: 15px; font-weight: 700; }
    .verdict-text .host { font-size: 12px; color: var(--text-2); word-break: break-all; }
    .score-pill {
      margin-left: auto; flex-shrink: 0;
      font-size: 12px; font-weight: 700;
      padding: 4px 10px; border-radius: 999px;
      background: var(--surface); color: var(--text-2);
      font-variant-numeric: tabular-nums;
    }

    .signals { padding: 0 16px 12px; }
    .signals .item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 12px; color: var(--text-2);
      padding: 6px 0;
      border-top: 1px solid var(--border);
    }
    .signals .item:first-child { border-top: none; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); margin-top: 5px; flex-shrink: 0; }

    .check-box { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); }
    .check-box label { display: block; font-size: 11px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    textarea {
      width: 100%; height: 56px; resize: none;
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px; font-size: 12px; font-family: inherit;
      background: #fff; color: var(--text);
    }
    textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15,123,77,0.15); }
    .btn {
      width: 100%; margin-top: 8px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 8px;
      padding: 9px; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background 160ms ease, transform 120ms ease, box-shadow 160ms ease;
    }
    .btn:hover { background: #0C6440; box-shadow: 0 4px 12px rgba(15,123,77,0.25); }
    .btn:active { transform: scale(0.97); }
    .btn:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(15,123,77,0.35); }
    .btn[disabled] { opacity: 0.55; cursor: default; box-shadow: none; transform: none; }
    .btn.secondary { background: transparent; color: var(--primary); border: 1px solid var(--border); }
    .btn.secondary:hover { background: var(--primary-light); }

    .stats { display: flex; gap: 8px; padding: 12px 16px; }
    .stat { flex: 1; background: var(--surface); border-radius: 8px; padding: 8px 10px; text-align: center; }
    .stat .num { font-size: 18px; font-weight: 700; color: var(--primary); font-variant-numeric: tabular-nums; }
    .stat .cap { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.04em; }

    .footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-top: 1px solid var(--border);
    }
    .toggle { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-2); }
    .switch { position: relative; width: 34px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #CBD5D0; border-radius: 999px; transition: 0.2s; cursor: pointer; }
    .slider::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
    input:checked + .slider { background: var(--primary); }
    input:checked + .slider::before { transform: translateX(14px); }
    .slider::before { box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    .switch input:focus-visible + .slider { box-shadow: 0 0 0 3px rgba(15,123,77,0.35); }
    .link {
      font-size: 12px; color: var(--primary); text-decoration: none; font-weight: 600; cursor: pointer;
      border-radius: 6px; padding: 2px 4px; margin: -2px -4px;
      transition: background 160ms ease, transform 120ms ease;
    }
    .link:hover { background: var(--primary-light); }
    .link:active { transform: scale(0.97); }
    .link:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(15,123,77,0.35); }
    #paste-result > div { animation: sn-rise 220ms ease-out both; }
    .hidden { display: none; }

    /* Honour the OS "reduce motion" setting — calm by default, still by request. */
    @media (prefers-reduced-motion: reduce) {
      *, .verdict, .signals, .stats, .check-box, .footer, .signals .item, .orb, .orb.pulse, #paste-result > div {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L4 5v6c0 5 3.5 8.5 8 10 4.5-1.5 8-5 8-10V5l-8-3Z" fill="#fff" opacity="0.25"/>
        <path d="M12 2L4 5v6c0 5 3.5 8.5 8 10 4.5-1.5 8-5 8-10V5l-8-3Z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="brand">SafeNet SA <small>Family Shield</small></div>
  </div>

  <div class="verdict">
    <div class="orb" id="orb" role="img" aria-label="Safety status"></div>
    <div class="verdict-text">
      <div class="label" id="verdict-label">Checking…</div>
      <div class="host" id="verdict-host"></div>
    </div>
    <div class="score-pill" id="score-pill" aria-label="Risk score">—</div>
  </div>

  <div class="signals" id="signals"></div>

  <div class="stats">
    <div class="stat"><div class="num" id="stat-checked">0</div><div class="cap">Checked today</div></div>
    <div class="stat"><div class="num" id="stat-blocked">0</div><div class="cap">Dangers caught</div></div>
  </div>

  <div class="check-box">
    <label for="paste">Check a link or message</label>
    <textarea id="paste" placeholder="Paste a suspicious WhatsApp message or link…"></textarea>
    <button class="btn" id="check-btn">Check now</button>
    <div id="paste-result"></div>
  </div>

  <div class="footer">
    <label class="toggle">
      <span class="switch"><input type="checkbox" id="autoscan" checked /><span class="slider"></span></span>
      Auto-protect
    </label>
    <a class="link" id="open-scanner" role="button" tabindex="0">Open full scanner →</a>
  </div>

  <script src="linkRisk.js"></script>
  <script src="popup.js"></script>
</body>
</html>
